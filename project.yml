name: FocusSession
options:
  deploymentTarget:
    macOS: "15.0"
  bundleIdPrefix: com.baessu
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    MARKETING_VERSION: "1.2.2"
    CURRENT_PROJECT_VERSION: "5"
targets:
  FocusSession:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: Sparkle
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        # Auto-update (Sparkle). Replace SUPublicEDKey with the public key printed
        # by `generate_keys` (private key stays in your Keychain). The appcast is
        # served from the repo's raw URL.
        SUFeedURL: https://raw.githubusercontent.com/baessu/focus-session/main/appcast.xml
        SUPublicEDKey: GN51aLdY+rXY6+rVc+zUqjVdacALXjZm/5fZNY/qVfo=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baessu.focussession
        CODE_SIGN_ENTITLEMENTS: Sources/App/FocusSession.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
